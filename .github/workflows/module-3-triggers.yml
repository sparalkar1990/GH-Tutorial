name: Module 3 - Trigger Playground

run-name: "Triggered by ${{ github.event_name }} on ${{ github.ref_name }}"

on:
    push:
        branches:
            - main
            - develop
            - feature/**
        paths: 
            - "src/*"
            - ".github/workflows/module-3-triggers.yml"    
    
    pull_request: 
        types: 
            - opened
            - synchronize
            - reopened
        paths: 
            - "src/**"

    workflow_dispatch: 
        inputs:
            environment:
                description: "Select Target ENV:"
                required: true
                type: choice
                options:
                    - dev
                    - qa
                    - prod
            
            run-test:
                description: "Run Test Stage?"
                required: true
                type: boolean
                default: true
    
    schedule:
        - cron: "30 3 * * 1-5" 

jobs:
    event-info:
        name: "Print Trigger Information"
        runs-on: ubuntu-latest
        
        steps:
            - name: "Show Trigger Details"
              run: |
                echo "Event Name: ${{ github.event_name }}"
                echo "Branch / Ref Name: ${{ github.ref_name }}"
                echo "Full Ref: ${{ github.ref }}"
                echo "Triggered By: ${{ github.triggering_actor }} or ${{ github.actor }}"
                echo "Repository: ${{ github.repository }}"
                echo "Commit SHA: ${{ github.sha }}"
            
            - name: "Checkout Repository"
              uses: action/checkout@v4
            
            - name: "Show Repository Files"
              run : |
                pwd
                ls -l

            - name: "Manual input details"
                if: github.event_name == "workflow_dispatch"
                run: |
                    echo "Selected ENV is ${{ inputs.environment }}"
                    echo "Run Tests: ${{ inputs.run_tests }}"    

            - name: "Push specific step"
              if: github.event_name == "push"
              run :
                echo "This step runs only on push event.."

            - name: "Scheduled specific step"
              if: github.event_name == "schedule"
              run: echo "This step runs only on Scedule event"
